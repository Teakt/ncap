default:
  image: python:3.14-slim 

stages:          # l'ordre des étapes du pipeline
  - lint
  - test
  - build

variables:
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "/certs/client"

.python-setup: &python-setup     # job "caché" (le point devant = template, non exécuté)
  before_script:
    - cd services/products-api
    - pip install -r requirements-dev.txt

lint-job:                          # un nom de job, libre
  stage: lint                      # à quelle étape il appartient        # le conteneur dans lequel il s'exécute
  <<: *python-setup   
  script:                          # les commandes, comme dans ton terminal
    - ruff check app/

test-job:
  stage: test
  <<: *python-setup   
  script:
    - python -m pytest

build-job:
  stage: build
  image: docker:cli          # le client
  services:
    - docker:dind            # le daemon, à côté
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA ./services/products-api